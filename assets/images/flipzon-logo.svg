<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flipzonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b7285;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f08c00;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#flipzonGradient)" opacity="0.1" stroke="url(#flipzonGradient)" stroke-width="2"/>

  <!-- Main F letter with rotation effect -->
  <g transform="translate(100, 100)">
    <!-- Outer badge circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="url(#flipzonGradient)" stroke-width="3" opacity="0.6"/>
    
    <!-- Inner decorative circle -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#flipzonGradient)" stroke-width="1.5" opacity="0.4"/>

    <!-- Main "F" monogram -->
    <text x="0" y="12" font-size="80" font-weight="900" font-family="Arial, sans-serif" text-anchor="middle" fill="url(#flipzonGradient)" filter="url(#dropShadow)" letter-spacing="-2">F</text>

    <!-- Decorative flip accent -->
    <path d="M -35 -45 L 35 -45 L 35 -35 L -35 -35 Z" fill="url(#flipzonGradient)" opacity="0.7" rx="4"/>
    <path d="M 35 35 L -35 35 L -35 45 L 35 45 Z" fill="url(#flipzonGradient)" opacity="0.7" rx="4"/>
  </g>

  <!-- "FLIPZON" text below -->
  <text x="100" y="175" font-size="18" font-weight="700" font-family="Arial, sans-serif" text-anchor="middle" fill="url(#flipzonGradient)" letter-spacing="1">FLIPZON</text>
</svg>